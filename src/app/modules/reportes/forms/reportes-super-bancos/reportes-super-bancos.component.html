<mat-card class="super-bancos-card">
  <mat-card-header>
    <mat-card-title>Reportes para la Super de Bancos</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="filtros-grid">
      <mat-form-field appearance="outline">
        <mat-label>Mes</mat-label>
        <mat-select [value]="mesSeleccionado()" (selectionChange)="onMesChange($event.value)">
          @for (mes of meses; track mes.valor) {
            <mat-option [value]="mes.valor">{{ mes.nombre }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Año</mat-label>
        <mat-select [value]="anioSeleccionado()" (selectionChange)="onAnioChange($event.value)">
          @for (anio of anios; track anio) {
            <mat-option [value]="anio">{{ anio }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>

    <div class="acciones">
      <button mat-flat-button color="primary" (click)="generarArchivos()">Generar archivos</button>
    </div>

    @if (procesoEjecutado()) {
      <div class="opciones-circulos">
        @for (opcion of opcionesGeneradas(); track opcion) {
          <button
            type="button"
            class="circulo-opcion"
            (click)="abrirDialogoOpcion(opcion)">
            {{ opcion }}
          </button>
        }
      </div>
    }
  </mat-card-content>
</mat-card>
